<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 220" fill="none">
  <style>
    .tile { rx: 16; ry: 16; fill: #1e1e2e; stroke: #45475a; stroke-width: 1.5; }
    .label { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 16px; font-weight: 600; fill: #cdd6f4; text-anchor: middle; }
    .sublabel { font-family: 'SF Mono', Menlo, Consolas, monospace; font-size: 11px; fill: #7f849c; text-anchor: middle; }
    .arrow { stroke: #6c7086; stroke-width: 2; marker-end: url(#head); }
    .arrow-label { font-family: 'SF Mono', Menlo, Consolas, monospace; font-size: 11px; fill: #585b70; text-anchor: middle; }
    .arrow-sublabel { font-family: 'SF Mono', Menlo, Consolas, monospace; font-size: 10px; fill: #45475a; text-anchor: middle; }
  </style>
  <defs>
    <marker id="head" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <path d="M0,0 L9,3.5 L0,7 Z" fill="#6c7086"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="720" height="220" rx="20" ry="20" fill="#11111b"/>

  <!-- ── CLI tile ───────────────────────────────────────────────────────── -->
  <rect class="tile" x="80" y="40" width="200" height="140"/>
  <!-- Terminal window mock -->
  <g transform="translate(140,68)">
    <!-- window chrome -->
    <rect x="0" y="0" width="80" height="56" rx="6" ry="6" fill="#181825" stroke="#45475a" stroke-width="1"/>
    <!-- traffic lights -->
    <circle cx="8" cy="8" r="2.5" fill="#f38ba8"/>
    <circle cx="16" cy="8" r="2.5" fill="#f9e2af"/>
    <circle cx="24" cy="8" r="2.5" fill="#a6e3a1"/>
    <!-- prompt $ -->
    <text x="8" y="36" font-family="'SF Mono', Menlo, monospace" font-size="10" fill="#a6e3a1">$</text>
    <text x="18" y="36" font-family="'SF Mono', Menlo, monospace" font-size="10" fill="#cdd6f4">lose-it</text>
  </g>
  <text class="label" x="180" y="148">lose-it CLI</text>

  <!-- ── Arrow with annotations ─────────────────────────────────────────── -->
  <line class="arrow" x1="290" y1="110" x2="430" y2="110"/>
  <text class="arrow-label" x="360" y="98">GWT-RPC</text>
  <text class="arrow-sublabel" x="360" y="128">/web/service · liauth JWT</text>

  <!-- ── LoseIt tile ────────────────────────────────────────────────────── -->
  <rect class="tile" x="440" y="40" width="200" height="140"/>
  <image href="loseit-logo.png" x="480" y="91" width="120" height="37" preserveAspectRatio="xMidYMid meet"/>
</svg>
