# CI: lint, format-check, secret-scan, unit tests, version check, tag-on-merge.
#
# Tests under tests/functional/ marked ``@pytest.mark.requires_auth`` are NOT
# run in CI — they hit the real Lose It! API and need a valid ``liauth`` JWT
# plus the LOSEIT_* config on disk. ``pyproject.toml`` sets
# ``addopts = ["-m", "not requires_auth"]`` so the default ``pytest``
# invocation below excludes them automatically; CI never overrides that.
#
# Version policy: ``version.txt`` is the single source of truth (read by
# hatchling at build time via ``[tool.hatch.version]`` in pyproject.toml).
# Every PR that lands on main must bump it; the ``version-check`` job below
# fails fast (independent of tests) when the tag ``v{version}`` already exists.
# On push to main, ``tag-release`` pushes that tag.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ── Fail-fast version gate ────────────────────────────────────────────────
  #
  # Independent of the rest of CI: runs in parallel so a missed bump surfaces
  # immediately while tests/lint still report their own outcome.
  version-check:
    name: Version bump check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0  # need tags

      - name: Read version.txt
        id: ver
        run: |
          set -euo pipefail
          if [ ! -f version.txt ]; then
            echo "::error::version.txt is missing"
            exit 1
          fi
          VERSION=$(tr -d '[:space:]' < version.txt)
          if ! printf '%s' "$VERSION" | grep -Eq '^0\.[0-9]+\.[0-9]+([.-].+)?$'; then
            echo "::error::version.txt must be 0.x.x (project is alpha); got '$VERSION'"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      - name: Fail if tag v${{ steps.ver.outputs.version }} already exists
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          git fetch --tags --quiet
          if git rev-parse -q --verify "refs/tags/v${VERSION}" >/dev/null; then
            echo "::error::Tag v${VERSION} already exists — bump version.txt before merging."
            exit 1
          fi
          echo "OK: v${VERSION} is unreleased."

  ci:
    name: Lint, scan, test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          # gitleaks needs the full history so it can scan the diff range.
          fetch-depth: 0

      - name: Set up uv (with built-in Python ${{ matrix.python-version }})
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Install dependencies (uv sync)
        run: uv sync --frozen

      - name: ruff check
        run: uv run ruff check .

      - name: ruff format --check
        run: uv run ruff format --check .

      - name: gitleaks (scan diff + history)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

      # Only run pytest when files in src/ or tests/ changed (PRs), or on any
      # push to main. Doc-only PRs don't change runtime behavior, so re-running
      # the suite would just burn CI minutes.
      - name: Detect source/test changes
        id: paths
        uses: dorny/paths-filter@v3
        with:
          filters: |
            code:
              - 'src/**'
              - 'tests/**'
              - 'pyproject.toml'
              - 'uv.lock'
              - '.github/workflows/ci.yml'

      # ``requires_auth`` tests are excluded by the default ``addopts``
      # filter in pyproject.toml; CI doesn't need to do anything extra.
      - name: pytest (unit tests + coverage)
        if: github.event_name == 'push' || steps.paths.outputs.code == 'true'
        run: |
          uv run pytest \
            --cov=lose_it \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=70

      - name: Upload coverage artifact
        if: always() && (github.event_name == 'push' || steps.paths.outputs.code == 'true')
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml-py${{ matrix.python-version }}
          path: coverage.xml
          if-no-files-found: ignore

  # ── Tag release on merge to main ──────────────────────────────────────────
  #
  # Push-only. Waits on ``version-check`` and ``ci`` so we never tag a broken
  # commit. The tag points at the merge commit on main; the badge job (below)
  # is unchanged and still depends on ``ci``.
  tag-release:
    name: Tag v{version} on main
    needs: [version-check, ci]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Push tag from version.txt
        run: |
          set -euo pipefail
          VERSION=$(tr -d '[:space:]' < version.txt)
          TAG="v${VERSION}"
          git fetch --tags --quiet
          if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
            echo "Tag ${TAG} already exists on remote — nothing to do."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${TAG}" -m "Release ${TAG}"
          git push origin "${TAG}"
          echo "Pushed ${TAG}."

  # ── Dynamic coverage badge ────────────────────────────────────────────────
  #
  # Only runs on pushes to main (skipped on PRs — we don't want PRs from forks
  # to be able to mutate the badges branch). Reads the coverage.xml produced
  # by the ``ci`` job, generates a shields.io ``endpoint``-format JSON, and
  # pushes it to the ``badges`` orphan branch. The README renders the badge
  # via ``https://img.shields.io/endpoint?url=…/badges/coverage.json``.
  #
  # Uses only the default GITHUB_TOKEN — no Gist, no PAT, no third-party
  # action. ``badges`` is not in the workflow's push trigger, so updates to
  # it don't loop CI.
  coverage-badge:
    name: Update coverage badge
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout (main, for git config + remote URL)
        uses: actions/checkout@v5

      - name: Download coverage artifact from ci job
        uses: actions/download-artifact@v4
        with:
          name: coverage-xml-py3.12

      - name: Compute coverage percentage + color
        id: cov
        run: |
          # The coverage.xml root element has a `line-rate` attribute that's
          # the fraction of lines covered (0.0–1.0). Round to int percent.
          PCT=$(python -c "
          import xml.etree.ElementTree as ET
          rate = float(ET.parse('coverage.xml').getroot().attrib['line-rate'])
          print(round(rate * 100))
          ")
          if [ "$PCT" -ge 90 ]; then COLOR=brightgreen
          elif [ "$PCT" -ge 80 ]; then COLOR=green
          elif [ "$PCT" -ge 70 ]; then COLOR=yellowgreen
          elif [ "$PCT" -ge 60 ]; then COLOR=yellow
          elif [ "$PCT" -ge 50 ]; then COLOR=orange
          else COLOR=red
          fi
          echo "pct=$PCT" >> "$GITHUB_OUTPUT"
          echo "color=$COLOR" >> "$GITHUB_OUTPUT"
          echo "Coverage: $PCT% ($COLOR)"

      - name: Push badge JSON to ``badges`` branch
        env:
          PCT: ${{ steps.cov.outputs.pct }}
          COLOR: ${{ steps.cov.outputs.color }}
        run: |
          set -euo pipefail
          # shields.io endpoint badge schema:
          # https://shields.io/badges/endpoint-badge
          cat > /tmp/coverage.json <<EOF
          {"schemaVersion": 1, "label": "coverage", "message": "${PCT}%", "color": "${COLOR}"}
          EOF
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Checkout (or create) an orphan ``badges`` branch in a temp worktree.
          # Worktree keeps the main checkout clean so future workflow steps
          # (none today, but resilient against additions) still see source.
          if git ls-remote --exit-code --heads origin badges > /dev/null; then
            git fetch origin badges
            git worktree add /tmp/badges-worktree badges
          else
            git worktree add --orphan -b badges /tmp/badges-worktree
          fi
          cp /tmp/coverage.json /tmp/badges-worktree/coverage.json
          cd /tmp/badges-worktree
          # Stage only coverage.json. Any other files that came along for the
          # ride (worktree was checked out from main's tree in the orphan case,
          # or from the existing badges branch otherwise) stay un-staged → they
          # don't end up in this commit. We deliberately do NOT ``rm -rf`` the
          # worktree contents: an earlier revision did, but the ``.[!.]*`` glob
          # matched the worktree's own ``.git`` link file and detached us from
          # the repo. Just stage what we want and ignore the rest.
          git add coverage.json
          if git diff --staged --quiet; then
            echo "Coverage unchanged (${PCT}%); skipping commit."
          else
            git commit -m "ci: bump coverage badge to ${PCT}%"
            git push origin badges
          fi
